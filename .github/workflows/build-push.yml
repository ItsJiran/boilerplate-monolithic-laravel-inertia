name: 🐳 Build and Push Image

on:
  workflow_run:
    workflows: ["Feature Tests (CI)"]
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    # Build only starts if Test workflow succeeded AND it was triggered by a TAG (v*)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.event.workflow_run.head_branch == 'master' }}
            type=ref,event=branch,enable=${{ startsWith(github.event.workflow_run.head_branch, 'master') }}
            type=raw,value=${{ github.event.workflow_run.head_branch }},enable=${{ startsWith(github.event.workflow_run.head_branch, 'v') }}
            # Note: workflow_run.head_branch for tags contains the tag name (e.g. v1.0.0)

      # --- BUILD APP IMAGE (Base) ---
      - name: Build and push Docker image (App Base)
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- (Optional) If you have separate images for Nginx/HMR, add steps here ---
