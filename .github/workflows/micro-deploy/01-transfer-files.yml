name: "📦 [Micro Deploy 1/6] Transfer Files"

# =========================================================
# Transfers all DevOps files to the target server.
# Source code (app/) is NOT transferred - only deployment artifacts.
#
# Files transferred:
#   scripts/, infra/, run.sh, setup.sh,
#   setup-nginx.sh, setup-nginx-host.sh,
#   config.json,
#   .env.example, docker-compose.yml, docker-compose.prod.yml
#
# Required Secrets (set per environment in GitHub Settings):
#   DEPLOY_SSH_HOST          - Server IP or hostname
#   DEPLOY_SSH_USER          - SSH user
#   DEPLOY_SSH_KEY           - SSH private key (PEM)
#   DEPLOY_PATH              - Remote deploy directory (e.g. /opt/myapp)
#   DEPLOY_SSH_PORT          - SSH port (optional, default: 22)
#   DEPLOY_SSH_KNOWN_HOSTS   - Output of `ssh-keyscan -H <host>` (recommended)
# =========================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, production]
        default: production

permissions:
  contents: read

jobs:
  transfer:
    name: "Transfer files → ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_SSH_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -n "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            echo "⚠️  DEPLOY_SSH_KNOWN_HOSTS not set — using ssh-keyscan (less secure)"
            ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Ensure remote directory exists
        run: |
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/deploy_key \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '$DEPLOY_PATH'"

      - name: Rsync scripts/
        run: |
          rsync -avz --delete \
            -e "ssh -p $DEPLOY_PORT -i ~/.ssh/deploy_key" \
            scripts/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/scripts/"

      - name: Rsync infra/
        run: |
          rsync -avz --delete \
            -e "ssh -p $DEPLOY_PORT -i ~/.ssh/deploy_key" \
            --exclude="ssl/*.pem" \
            --exclude="ssl/*.key" \
            --exclude="ssl/*.crt" \
            infra/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/infra/"

      - name: Rsync root DevOps files
        run: |
          FILES=(run.sh setup.sh setup-nginx.sh setup-nginx-host.sh config.json)
          for f in .env.example .env.*.example; do
            [ -f "$f" ] && FILES+=("$f")
          done
          for f in docker-compose.yml docker-compose.prod.yml; do
            [ -f "$f" ] && FILES+=("$f")
          done
          rsync -avz \
            -e "ssh -p $DEPLOY_PORT -i ~/.ssh/deploy_key" \
            "${FILES[@]}" \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

      - name: Make scripts executable
        run: |
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/deploy_key \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "find '$DEPLOY_PATH/scripts' -name '*.sh' -exec chmod +x {} + \
             && chmod +x '$DEPLOY_PATH/run.sh' '$DEPLOY_PATH/setup.sh' \
             && chmod +x '$DEPLOY_PATH/setup-nginx.sh' '$DEPLOY_PATH/setup-nginx-host.sh'"

      - name: Verify remote listing
        run: |
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/deploy_key \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "echo '--- $DEPLOY_PATH ---' && ls -la '$DEPLOY_PATH/'"
