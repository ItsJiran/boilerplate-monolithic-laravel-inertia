name: "🔀 [Micro Deploy 3/6] Setup Nginx (Single 1-1)"

# =========================================================
# New nginx flow:
# 1) setup-nginx-template.sh       -> generate LB template entry (1-1)
# 2) setup-nginx-host-template.sh  -> generate host template entry (1-1)
# 3) setup-nginx-host.sh           -> deploy host template to sites-available/*.conf
# =========================================================

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [staging, production]
        default: production
      target:
        description: "Generate/deploy target"
        required: true
        type: choice
        options: [lb, host-template, host-deploy, host-all, both]
        default: both
      service:
        description: "Service: app|hmr|s3|s3-console|pma|reverb|grafana(host-only)"
        required: true
        type: string
      domain:
        description: "Domain for this single entry"
        required: true
        type: string

      ssl_mode:
        description: "Host SSL mode"
        required: false
        type: choice
        options: [letsencrypt, stepca, manual]
        default: letsencrypt
      ssl_cert:
        description: "Host SSL cert path (manual required)"
        required: false
        type: string
        default: ""
      ssl_key:
        description: "Host SSL key path (manual required)"
        required: false
        type: string
        default: ""

      host_file_name:
        description: "Destination filename in sites-available (without/with .conf)"
        required: false
        type: string
        default: ""
      host_source_template:
        description: "Host source template file"
        required: false
        type: string
        default: "infra/nginx/default.conf.vps.template"
      host_copy_to:
        description: "Optional extra copy path for deployed host config"
        required: false
        type: string
        default: ""

      lb_output_path:
        description: "Optional LB output template path"
        required: false
        type: string
        default: ""

      dry_run:
        description: "Dry run"
        required: false
        type: boolean
        default: false
      skip_reload:
        description: "Skip nginx reload on host deploy"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  setup-nginx-single:
    name: "Nginx single (${{ inputs.service }}:${{ inputs.domain }}) → ${{ inputs.environment }}"
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_SSH_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_SSH_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

    steps:
      - name: Validate input combinations
        run: |
          TARGET='${{ inputs.target }}'
          SERVICE='${{ inputs.service }}'
          SSL_MODE='${{ inputs.ssl_mode }}'
          SSL_CERT='${{ inputs.ssl_cert }}'
          SSL_KEY='${{ inputs.ssl_key }}'

          if [[ "$TARGET" == "lb" && "$SERVICE" == "grafana" ]]; then
            echo "❌ grafana is host-only"
            exit 1
          fi

          if [[ "$SSL_MODE" == "manual" ]]; then
            [[ -z "$SSL_CERT" ]] && { echo "❌ ssl_cert required for manual"; exit 1; }
            [[ -z "$SSL_KEY" ]] && { echo "❌ ssl_key required for manual"; exit 1; }
          fi

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          if [ -n "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" ]; then
            printf '%s\n' "${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts
          else
            ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          fi
          chmod 644 ~/.ssh/known_hosts

      - name: Run nginx setup
        run: |
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" bash -s <<'REMOTE'
            set -euo pipefail
            cd '${{ secrets.DEPLOY_PATH }}'

            TARGET='${{ inputs.target }}'
            SERVICE='${{ inputs.service }}'
            DOMAIN='${{ inputs.domain }}'
            DRY_RUN='${{ inputs.dry_run }}'
            SKIP_RELOAD='${{ inputs.skip_reload }}'

            lb_args=(--single "--service=$SERVICE" "--domain=$DOMAIN")
            host_tpl_args=(--single "--service=$SERVICE" "--domain=$DOMAIN")
            host_deploy_args=("--source=${{ inputs.host_source_template }}")

            [ -n '${{ inputs.lb_output_path }}' ] && lb_args+=("--output=${{ inputs.lb_output_path }}")
            [ -n '${{ inputs.host_file_name }}' ] && host_tpl_args+=("--host-file-name=${{ inputs.host_file_name }}") && host_deploy_args+=("--file-name=${{ inputs.host_file_name }}")
            [ -n '${{ inputs.host_copy_to }}' ] && host_deploy_args+=("--copy-to=${{ inputs.host_copy_to }}")

            if [ '${{ inputs.ssl_mode }}' = 'manual' ]; then
              host_tpl_args+=("--ssl-mode=manual" "--ssl-cert=${{ inputs.ssl_cert }}" "--ssl-key=${{ inputs.ssl_key }}")
            else
              host_tpl_args+=("--ssl-mode=${{ inputs.ssl_mode }}")
              [ -n '${{ inputs.ssl_cert }}' ] && host_tpl_args+=("--ssl-cert=${{ inputs.ssl_cert }}")
              [ -n '${{ inputs.ssl_key }}' ] && host_tpl_args+=("--ssl-key=${{ inputs.ssl_key }}")
            fi

            [ "$DRY_RUN" = "true" ] && host_deploy_args+=("--dry-run")
            [ "$SKIP_RELOAD" = "true" ] && host_deploy_args+=("--skip-reload")

            if [ "$TARGET" = "lb" ] || [ "$TARGET" = "both" ]; then
              echo "🔧 LB single: ./setup.sh setup-nginx-template.sh ${lb_args[*]}"
              ./setup.sh setup-nginx-template.sh "${lb_args[@]}"
            fi

            if [ "$TARGET" = "host-template" ] || [ "$TARGET" = "host-all" ] || [ "$TARGET" = "both" ]; then
              echo "🔧 Host template single: ./setup.sh setup-nginx-host-template.sh ${host_tpl_args[*]}"
              ./setup.sh setup-nginx-host-template.sh "${host_tpl_args[@]}"
            fi

            if [ "$TARGET" = "host-deploy" ] || [ "$TARGET" = "host-all" ] || [ "$TARGET" = "both" ]; then
              echo "🔧 Host deploy: sudo ./setup.sh setup-nginx-host.sh ${host_deploy_args[*]}"
              sudo ./setup.sh setup-nginx-host.sh "${host_deploy_args[@]}"
            fi
          REMOTE
