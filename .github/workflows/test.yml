name: 🧪 Feature Tests (CI)

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

env:
  # Environment Variables for CI
  DB_DATABASE: testing_db
  DB_USERNAME: admin
  DB_PASSWORD: password
  DB_ROOT_PASSWORD: root
  # Must match services in docker-compose.yml (or we can override)

jobs:
  feature-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------------------------------------------
      # 1. Setup Environment (Mimics Deployment Flow)
      # -------------------------------------------------------------
      - name: Setup Configuration
        run: |
          chmod +x setup.sh scripts/setup/*.sh
          
          # 1. Generate Base Configs (Syncs from config.json)
          ./setup.sh setup-env.sh --force
          
          # 2. Inject CI/Testing Specific Variables
          # This mimics the "Secret Injection" step in deploy.sh
          echo "👉 Injecting CI Testing configurations..."
          
          # Update .env (Main)
          sed -i "s|^APP_ENV=.*|APP_ENV=testing|" .env
          sed -i "s|^APP_DEBUG=.*|APP_DEBUG=true|" .env
          
          # Update .env.backend (Database & Redis)
          sed -i "s|^DB_CONNECTION=.*|DB_CONNECTION=mysql|" .env.backend
          sed -i "s|^DB_HOST=.*|DB_HOST=mariadb|" .env.backend
          sed -i "s|^DB_PORT=.*|DB_PORT=3306|" .env.backend
          sed -i "s|^DB_DATABASE=.*|DB_DATABASE=${{ env.DB_DATABASE }}|" .env.backend
          sed -i "s|^DB_USERNAME=.*|DB_USERNAME=${{ env.DB_USERNAME }}|" .env.backend
          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${{ env.DB_PASSWORD }}|" .env.backend
          sed -i "s|^MARIADB_ROOT_PASSWORD=.*|MARIADB_ROOT_PASSWORD=${{ env.DB_ROOT_PASSWORD }}|" .env.backend
          
          sed -i "s|^REDIS_HOST=.*|REDIS_HOST=redis|" .env.backend
          sed -i "s|^REDIS_PASSWORD=.*|REDIS_PASSWORD=redispassword|" .env.backend
          
          # Append Docker Tag (Required for Compose)
          if ! grep -q "DOCKER_IMAGE_TAG=" .env; then
            echo "DOCKER_IMAGE_TAG=ci-build" >> .env
          else
            sed -i "s|^DOCKER_IMAGE_TAG=.*|DOCKER_IMAGE_TAG=ci-build|" .env
          fi

          sudo ./setup.sh setup-hosts.sh
          sudo ./setup.sh setup-nginx-host.sh

      # -------------------------------------------------------------
      # 2. Start Infrastructure (Docker Compose)
      # -------------------------------------------------------------
      - name: Start Services (Step CA & Nginx Host)
        run: |
          # 1. Install Nginx (Host/VPS Simulation)
          sudo apt-get update
          sudo apt-get install -y nginx
          sudo systemctl stop nginx # Stop to allow config changes

          # 2. Setup Internal Network
          # Ensure network exists before starting services (external: true in compose)
          if [ -f .env ]; then
            set -a # automatically export all variables
            source .env
            set +a
          fi
          
          # Default fallback
          export APP_NETWORK="${APP_NETWORK:-app_boilerplate_network}"
          echo "Using network: $APP_NETWORK"
          
          # Create network if not exists
          docker network inspect "$APP_NETWORK" >/dev/null 2>&1 || docker network create "$APP_NETWORK"

          # 3. Install Step CLI (Required for SSL script)
          wget https://dl.step.sm/gh-release/cli/docs-cli-install/v0.24.4/step-cli_0.24.4_amd64.deb
          sudo dpkg -i step-cli_0.24.4_amd64.deb
          # Ensure 'step-cli' command exists (sometimes it installs as 'step')
          if ! command -v step-cli &> /dev/null; then
            if command -v step &> /dev/null; then
              sudo ln -s $(which step) /usr/bin/step-cli
            else
              echo "Error: step-cli installation failed"
              exit 1
            fi
          fi

          # 4. Start Step CA
          # Explicitly pass environment from shell or file
          docker compose --env-file .env -f infra/docker-compose.step-ca.yml up -d

          # 4. Generate Dev SSL
          # Wait for Step CA to be healthy (simple sleep or healthcheck)
          sleep 5
          chmod +x scripts/run/run.dev.ssl.sh
          ./run.sh run.dev.ssl.sh

          # 4. Setup Host Nginx (Requires Sudo)
          chmod +x scripts/setup/setup-nginx-host.sh
          # The script checks for sudo internally, but in CI we run as user 'runner', so use sudo
          sudo ./setup.sh setup-nginx-host.sh

          # 5. Setup /etc/hosts (Ephemeral DNS)
          # We need to point APP_DOMAIN to 127.0.0.1
          # Extract domain from .env
          APP_DOMAIN=$(grep APP_DOMAIN .env | cut -d '=' -f2)
          echo "127.0.0.1 $APP_DOMAIN api.$APP_DOMAIN reverb.$APP_DOMAIN minio.$APP_DOMAIN s3.$APP_DOMAIN" | sudo tee -a /etc/hosts

      - name: Start Containers (App Stack)
        run: |
          # Use run.app.sh wrapper (non-interactive mode)
          chmod +x run.sh scripts/run/*.sh
          ./run.sh run.app.sh up --build

      - name: Wait for Services (Database)
        run: |
          echo "Waiting for MariaDB to be ready..."
          for i in {1..30}; do
            if docker compose exec -T mariadb mariadb-admin ping -h localhost -u root -p${{ env.DB_ROOT_PASSWORD }} --silent; then
                echo "✅ MariaDB is up!"
                break
            fi
            echo "⏳ Waiting for Database..."
            sleep 2
          done

      - name: Setup Database (Testing)
        run: |
          # Create testing database
          docker compose exec -T mariadb mariadb -u root -p${{ env.DB_ROOT_PASSWORD }} -e "CREATE DATABASE IF NOT EXISTS ${{ env.DB_DATABASE }};"
          docker compose exec -T mariadb mariadb -u root -p${{ env.DB_ROOT_PASSWORD }} -e "GRANT ALL PRIVILEGES ON ${{ env.DB_DATABASE }}.* TO '${{ env.DB_USERNAME }}'@'%';"
          docker compose exec -T mariadb mariadb -u root -p${{ env.DB_ROOT_PASSWORD }} -e "FLUSH PRIVILEGES;"

      # -------------------------------------------------------------
      # 3. Execute Tests (Using run.sh -> scripts/run/test.sh)
      # -------------------------------------------------------------
      - name: Run Feature Tests
        run: |
          chmod +x run.sh scripts/run/*.sh

          # Wait for App Container to be running (avoid restart loops breaking exec)
          echo "⏳ Waiting for App container..."
          for i in {1..30}; do
            if [ "$(docker compose ps --services --filter "status=running" | grep -w app)" ]; then
              echo "✅ App container is running!"
              # Check if PHP is responsive inside
              if docker compose exec -T app php -v > /dev/null 2>&1; then
                 echo "✅ PHP CLI is ready!"
                 break
              fi
            fi
            echo "Waiting for App container... ($i/30)"
            sleep 3
          done

          # If loop finished but app not running, show logs and fail
          if ! [ "$(docker compose ps --services --filter "status=running" | grep -w app)" ]; then
            echo "❌ App container failed to start."
            docker compose logs app
            exit 1
          fi

          ./run.sh test.sh
