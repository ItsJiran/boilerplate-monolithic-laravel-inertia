version: '3.8'

# ==========================================
# ENTERPRISE GRADE - PRODUCTION COMPOSE FILE
# ==========================================
# Rules:
# 1. No "build: .". Use "image: registry/repo:tag".
# 2. No volume mounts for source code (./app:/var/www/html).
# 3. Use explicit entrypoints/commands for production.

services:
  mariadb:
    image: mariadb:latest
    env_file:
      - .env
      - ./.env.backend
      - ./.env.devops  
    command: ["mariadbd", "--innodb-use-native-aio=0", "--innodb-buffer-pool-size=${MARIADB_BUFFER_POOL}"]
    deploy:
      resources:
        limits:
          cpus: '${MARIADB_CPU_LIMIT:-0.5}'
          memory: '${MARIADB_MEM_LIMIT:-512m}'
    security_opt:
      - label:disable
    volumes:
      - app-mariadb-data:/var/lib/mysql
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "mariadb", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional for Prod: Only run once or run manually via CI/CD job
  db-init:
    image: mariadb:latest
    networks:
      - app_network
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - ./.env
      - ./.env.backend
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Check DB..."
        until mariadb -h mariadb -u root -p"$$MARIADB_ROOT_PASSWORD" --ssl=FALSE -e "status" > /dev/null 2>&1; do
          sleep 2
        done
        echo "Running DB migrations/seeds is usually done by app container or separate job."
        # Keep minimal logic here or remove if handled by app container
    logging:
      driver: "json-file"

  redis:
    image: redis:7-alpine
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops 
    deploy:
      resources:
        limits:
          cpus: '${REDIS_CPU_LIMIT:-0.2}'
          memory: '${REDIS_MEM_LIMIT:-256m}'     
    volumes:
      - app-redis-data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --port ${REDIS_PORT} --maxmemory ${REDIS_MAXMEMORY} --maxmemory-policy allkeys-lru

  # ---- APP SERVICES (ARTIFACTS) ----
  
  app:
    # IMAGE from GHCR (Defined in .env via deploy script)
    image: ${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG}
    user: root
    # Production Command: Start Octane (FrankenPHP) in production mode
    command: >
      sh -c "php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=8000 --workers=${SERVER_WORKERS:-auto}"
    deploy:
      resources:
        limits:
          cpus: '${SERVER_CPU_LIMIT:-1.0}'
          memory: '${SERVER_MEM_LIMIT:-512m}'
    expose:
      - "${APP_PORT}"
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops
    networks:
      - app_network
    # NO VOLUMES MOUNTED (Code is inside image)

    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  app-worker:
    image: ${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG}
    command: php artisan queue:work --tries=3 --timeout=90
    deploy:
      resources:
        limits:
          cpus: '${SERVER_CPU_LIMIT:-0.5}'
          memory: '${SERVER_MEM_LIMIT:-256m}'
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops
    networks:
      - app_network
    # NO VOLUMES
    restart: always
    logging:
      driver: "json-file"

  app-socket:
    image: ${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG}
    # Reverb Production Command
    command: php artisan reverb:start --host=0.0.0.0 --port=${REVERB_SERVER_PORT}
    deploy:
      resources:
        limits:
          cpus: '${SERVER_CPU_LIMIT:-0.5}'
          memory: '${SERVER_MEM_LIMIT:-256m}'
    expose:
      - "${REVERB_SERVER_PORT}"
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops
    networks:
      - app_network
    # NO VOLUMES
    restart: always
    logging:
      driver: "json-file"

  app-cron:
    image: ${DOCKER_IMAGE_NAME}:${DOCKER_IMAGE_TAG}
    command: php artisan schedule:work
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: '128m'
    env_file:
      - ./.env
      - ./.env.backend
    networks:
      - app_network
    # NO VOLUMES
    restart: always
    logging:
      driver: "json-file"
  
  load_balancer: 
    image: nginx:stable-alpine
    deploy:
      resources:
        limits:
          cpus: '${LOADBALANCER_CPU_LIMIT:-0.2}'
          memory: '${LOADBALANCER_MEM_LIMIT:-128m}'
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops  
    ports:
      - "${LOAD_BALANCER_PORT}:80"
      # HMR Port removed in Prod
    volumes:
      - ./infra/nginx/default.conf.lb.template:/etc/nginx/templates/default.conf.template:ro,Z
      # Certbot / LetsEncrypt volumes if needed
      # - ./certbot/conf:/etc/letsencrypt
      # - ./certbot/www:/var/www/certbot
    networks:
      - app_network
    restart: always

volumes:
  app-mariadb-data:
    driver: local
    name: ${MARIADB_VOLUME_NAME}
  app-redis-data:
    driver: local
    name: ${REDIS_VOLUME_NAME}

networks:
  app_network:
    name: ${APP_NETWORK:-app_boilerplate_network}
    driver: bridge
