services:
  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops     
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app-redis-data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli","-p","${REDIS_PORT}" , "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --port ${REDIS_PORT} --maxmemory ${REDIS_MAXMEMORY} --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  # ---- BACKEND SERVICE
  app:
    build:
      context: ./app
      dockerfile: ./Dockerfile
    user: root
    command:
      - sh
      - -c
      - "update-ca-certificates && su -s /bin/sh www-data -c 'php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=8000 --watch'"
    expose:
      - "${APP_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops
    networks:
      - app_network
    restart: unless-stopped
    working_dir: /var/www/html
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  app-worker:
    build:
      context: ./app
      dockerfile: ./Dockerfile
    command: php artisan queue:work
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "${APP_PORT}"
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops
    networks:
      - app_network
    restart: unless-stopped
    working_dir: /var/www/html
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  app-socket:
    build:
      context: ./app
      dockerfile: ./Dockerfile
    command: php artisan reverb:start --host=0.0.0.0 --port=${REVERB_SERVER_PORT} --debug
    expose:
      - "${APP_PORT}"
      - "${REVERB_SERVER_PORT}"
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops
    networks:
      - app_network
    restart: unless-stopped
    working_dir: /var/www/html
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  app-cron:
    build:
      context: ./app
      dockerfile: ./Dockerfile
    command: php artisan schedule:work
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops 
    networks:
      - app_network
    # restart: unless-stopped # Cron jangan restart policy strict jika exit code 0 (though schedule:work runs forever)
    restart: unless-stopped
    working_dir: /var/www/html
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)
  
  # nginx untuk run server backend
  load_balancer: 
    image: nginx:stable-alpine
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops  
    ports:
      - "${LOAD_BALANCER_PORT}:80"    
    volumes:
      - ./infra/nginx/default.conf.lb.template:/etc/nginx/templates/default.conf.template:ro,Z
      - /etc/letsencrypt:/etc/letsencrypt
    networks:
      - app_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

networks:
  app_network:
    name: ${APP_NETWORK:-app_boilerplate_network}
    external: true

volumes:
  app-redis-data:
    driver: local
    name: ${REDIS_VOLUME_NAME}
