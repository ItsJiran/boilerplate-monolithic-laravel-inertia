version: '3.8'

services:
  mariadb:
    image: mariadb:latest
    env_file:
      - .env
      - ./.env.backend
      - ./.env.devops  
    command: ["mariadbd", "--innodb-use-native-aio=0", "--innodb-buffer-pool-size=${MARIADB_BUFFER_POOL}"]
    deploy:
      resources:
        limits:
          cpus: '${MARIADB_CPU_LIMIT:-0}'
          memory: '${MARIADB_MEM_LIMIT:-0b}'
    security_opt:
      - label:disable
    volumes:
      - app-mariadb-data:/var/lib/mysql
      # - ./my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - app
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "mariadb", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  db-init:
    image: mariadb:latest
    networks:
      - app
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - ./.env
      - ./.env.backend
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Menunggu MariaDB siap (network check)..."
        # Gunakan --ssl=FALSE untuk menghindari error TLS self-signed
        until mariadb -h mariadb -u root -p"$$MARIADB_ROOT_PASSWORD" --ssl=FALSE -e "status" > /dev/null 2>&1; do
          sleep 2
        done

        echo "Memulai inisialisasi database dan user..."
        mariadb -h mariadb -u root -p"$$MARIADB_ROOT_PASSWORD" --ssl=FALSE <<-EOSQL
          -- 1. Buat Database
          CREATE DATABASE IF NOT EXISTS \`$$DB_DATABASE\`;

          -- 2. Pastikan Root bisa diakses dari remote (untuk monitoring)
          GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' IDENTIFIED BY '$$MARIADB_ROOT_PASSWORD' WITH GRANT OPTION;

          -- 3. Buat User Non-Root untuk Laravel
          CREATE USER IF NOT EXISTS '$$DB_USERNAME'@'%' IDENTIFIED BY '$$DB_PASSWORD';
          GRANT ALL PRIVILEGES ON \`$$DB_DATABASE\`.* TO '$$DB_USERNAME'@'%';
          
          -- 4. Hak akses tambahan untuk performa/monitoring
          GRANT PROCESS ON *.* TO '$$DB_USERNAME'@'%';
          GRANT REPLICATION CLIENT ON *.* TO '$$DB_USERNAME'@'%';
          GRANT REPLICATION SLAVE ON *.* TO '$$DB_USERNAME'@'%';
          GRANT SLAVE MONITOR ON *.* TO '$$DB_USERNAME'@'%';
          GRANT SELECT ON *.* TO '$$DB_USERNAME'@'%';

          -- 5. Buat user exporter
          CREATE USER IF NOT EXISTS '$$DB_EXPORTER_USERNAME'@'%' IDENTIFIED BY '$$DB_EXPORTER_PASSWORD' WITH MAX_USER_CONNECTIONS 3;

          -- 6. Berikan izin yang diperlukan untuk melihat statistik
          GRANT PROCESS, REPLICATION CLIENT, SELECT ON *.* TO '$$DB_EXPORTER_USERNAME'@'%';
          GRANT SLAVE MONITOR, SELECT ON *.* TO '$$DB_EXPORTER_USERNAME'@'%';

          FLUSH PRIVILEGES;
        EOSQL
        echo "Inisialisasi selesai! Service db-init akan berhenti sekarang."
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  phpmyadmin:
    image: phpmyadmin:latest
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops  
    environment:
      # References directly to the service name      
      PMA_HOST: ${DB_HOST}
      PMA_PORT: ${DB_PORT}
      PMA_AUTH_TYPE: cookie
      PMA_ARBITRARY: 1
      PMA_ABSOLUTE_URI: ${PMA_ABSOLUTE_URI}
    expose:
      - "80"
    networks:
      - app
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops 
    deploy:
      resources:
        limits:
          cpus: '${REDIS_CPU_LIMIT:-0}'
          memory: '${REDIS_MEM_LIMIT:-0b}'     
    ports:
      # FOR DEVELOPMENT PURPOSE ALLOW ALL
      - "${REDIS_PORT}:${REDIS_PORT}"
    volumes:
      - app-redis-data:/data
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli","-p","${REDIS_PORT}" , "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --port ${REDIS_PORT} --maxmemory ${REDIS_MAXMEMORY} --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  # ---- BACKEND SERVICE
  server:
    build:
      context: ./server
      dockerfile: ./Dockerfile.dev
    deploy:
      resources:
        limits:
          cpus: '${SERVER_CPU_LIMIT:-0}'
          memory: '${SERVER_MEM_LIMIT:-0b}'
    expose:
      - "${SERVER_PORT}"
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops
    networks:
      - app
    restart: unless-stopped
    working_dir: /var/www/html
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  server-worker:
    build:
      context: ./server
      dockerfile: ./Dockerfile.dev
    command: php artisan queue:work
    deploy:
      resources:
        limits:
          cpus: '${SERVER_CPU_LIMIT:-0}'
          memory: '${SERVER_MEM_LIMIT:-0b}'
    expose:
      - "${SERVER_PORT}"
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops
    networks:
      - app
    restart: unless-stopped
    working_dir: /var/www/html
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  server-socket:
    build:
      context: ./server
      dockerfile: ./Dockerfile.dev
    command: php artisan reverb:start
    deploy:
      resources:
        limits:
          cpus: '${SERVER_CPU_LIMIT:-0}'
          memory: '${SERVER_MEM_LIMIT:-0b}'
    expose:
      - "${SERVER_PORT}"
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops
    networks:
      - app
    restart: unless-stopped
    working_dir: /var/www/html
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  server-cron:
    build:
      context: ./server
      dockerfile: ./Dockerfile.dev
    command: php artisan schedule:work
    deploy:
      resources:
        limits:
          cpus: '${SERVER_CPU_LIMIT:-0}'
          memory: '${SERVER_MEM_LIMIT:-0b}'
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops 
    networks:
      - app
    # restart: unless-stopped # Cron jangan restart policy strict jika exit code 0 (though schedule:work runs forever)
    restart: unless-stopped
    working_dir: /var/www/html
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)
  
  # ---- FRONTEND SERVICE
  client:
    user: root 
    build:
      context: ./clients
      dockerfile: ./Dockerfile.web.dev
    deploy:
      resources:
        limits:
          cpus: '${CLIENT_CPU_LIMIT:-0}'
          memory: '${CLIENT_MEM_LIMIT:-0b}'
    env_file:
      - ./.env
    volumes:
      # PENTING: Untuk Production, hapus baris "." di bawah ini.
      # Gunakan Bind Mount hanya saat development agar code terupdate.
      - ./clients:/app:z
    expose:
      - "${CLIENT_PORT}"
    networks:
      - app
    extra_hosts:
      - "${APP_URL}:host-gateway"
      - "${API_URL}:${API_EXTRA_HOST}"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)
  
  # nginx untuk run server backend
  load_balancer: 
    image: nginx:stable-alpine
    deploy:
      resources:
        limits:
          cpus: '${LOADBALANCER_CPU_LIMIT:-0}'
          memory: '${LOADBALANCER_MEM_LIMIT:-0b}'
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops  
    ports:
      - "${LOAD_BALANCER_PORT}:80"
    volumes:
      - ./.docker/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro,Z
      - /etc/letsencrypt:/etc/letsencrypt
    networks:
      - app
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  # ==========================================
  # 1. MINIO SERVICE (The S3 Server)
  # ==========================================
  minio:
    hostname: minio
    image: minio/minio:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '${MINIO_CPU_LIMIT:-0}'
          memory: '${MINIO_MEM_LIMIT:-0b}'
    expose:
      - "${MINIO_PORT}" 
      - "${MINIO_CONSOLE_PORT}" 
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sail}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}

      MINIO_SERVER_URL: https://${S3_URL}
      MINIO_BROWSER_REDIRECT_URL: https://${S3_CONSOLE_URL}
    volumes:
      - app-minio-data:/data
    command: minio server /data --console-address ":${MINIO_CONSOLE_PORT}" --address ":${MINIO_PORT}"
    networks:
      - app
    extra_hosts:
      - "${S3_URL}:host-gateway"
      - "${S3_CONSOLE_URL}:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  # ==========================================
  # 2. AUTO CREATE BUCKET (Helper)
  # ==========================================
  createbuckets:
    image: minio/mc
    depends_on:
      - minio
    networks:
      - app
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sail}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-password}
      AWS_BUCKET: ${AWS_BUCKET:-app-bucket}
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Stop script jika terjadi error fatal (kecuali di dalam loop)
        set -e

        echo "⏳ Menunggu MinIO siap..."

        # Loop 'mc alias set' sampai berhasil.
        # Ini adalah cara paling valid menggantikan 'nc' karena image ini tidak punya netcat.
        until /usr/bin/mc alias set myminio http://${MINIO_SERVICE}:${MINIO_PORT} "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do
          echo "zzz... MinIO belum siap, mencoba lagi dalam 2 detik..."
          sleep 2
        done

        echo "🚀 MinIO Connected!"

        echo "📦 Membuat bucket: $AWS_BUCKET"
        # Gunakan '|| true' agar script tidak mati jika bucket sudah ada
        /usr/bin/mc mb myminio/"$AWS_BUCKET" --ignore-existing || true

        echo "🔓 Mengatur policy public..."
        /usr/bin/mc anonymous set public myminio/"$AWS_BUCKET"

        echo "✅ SETUP SELESAI!"
        exit 0

networks:
  app:
    name: ${APP_NETWORK:-app_boilerplate_network}
    external: true

volumes:
  app-mariadb-data:
    driver: local
    name: ${APP_SLUG:-app-boilerplate}-mariadb-data
  app-redis-data:
    driver: local
    name: ${APP_SLUG:-app-boilerplate}-redis-data
  app-storage:
    driver: local
    name: ${APP_SLUG:-app-boilerplate}-storage
  app-minio-data:
    driver: local
    name: ${APP_SLUG:-app-boilerplate}-minio-data
