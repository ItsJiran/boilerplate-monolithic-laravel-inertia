version: '3.8'

services:
  mariadb:
    image: mariadb:latest
    env_file:
      - .env
      - ./.env.backend
      - ./.env.devops  
    command: ["mariadbd", "--innodb-use-native-aio=0", "--innodb-buffer-pool-size=${MARIADB_BUFFER_POOL}"]
    deploy:
      resources:
        limits:
          cpus: '${MARIADB_CPU_LIMIT:-0}'
          memory: '${MARIADB_MEM_LIMIT:-0b}'
    security_opt:
      - label:disable
    volumes:
      - app-mariadb-data:/var/lib/mysql
      # - ./my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "mariadb", "-u", "root", "-p${DB_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  db-init:
    image: mariadb:latest
    networks:
      - app_network
    depends_on:
      mariadb:
        condition: service_healthy
    env_file:
      - ./.env
      - ./.env.backend
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Menunggu MariaDB siap (network check)..."
        # Gunakan --ssl=FALSE untuk menghindari error TLS self-signed
        until mariadb -h mariadb -u root -p"$$MARIADB_ROOT_PASSWORD" --ssl=FALSE -e "status" > /dev/null 2>&1; do
          sleep 2
        done

        echo "Memulai inisialisasi database dan user..."
        mariadb -h mariadb -u root -p"$$MARIADB_ROOT_PASSWORD" --ssl=FALSE <<-EOSQL
          -- 1. Buat Database
          CREATE DATABASE IF NOT EXISTS \`$$DB_DATABASE\`;

          -- 2. Pastikan Root bisa diakses dari remote (untuk monitoring)
          GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' IDENTIFIED BY '$$MARIADB_ROOT_PASSWORD' WITH GRANT OPTION;

          -- 3. Buat User Non-Root untuk Laravel
          CREATE USER IF NOT EXISTS '$$DB_USERNAME'@'%' IDENTIFIED BY '$$DB_PASSWORD';
          GRANT ALL PRIVILEGES ON \`$$DB_DATABASE\`.* TO '$$DB_USERNAME'@'%';
          
          -- 4. Hak akses tambahan untuk performa/monitoring
          GRANT PROCESS ON *.* TO '$$DB_USERNAME'@'%';
          GRANT REPLICATION CLIENT ON *.* TO '$$DB_USERNAME'@'%';
          GRANT REPLICATION SLAVE ON *.* TO '$$DB_USERNAME'@'%';
          GRANT SLAVE MONITOR ON *.* TO '$$DB_USERNAME'@'%';
          GRANT SELECT ON *.* TO '$$DB_USERNAME'@'%';

          -- 5. Buat user exporter
          CREATE USER IF NOT EXISTS '$$DB_EXPORTER_USERNAME'@'%' IDENTIFIED BY '$$DB_EXPORTER_PASSWORD' WITH MAX_USER_CONNECTIONS 3;

          -- 6. Berikan izin yang diperlukan untuk melihat statistik
          GRANT PROCESS, REPLICATION CLIENT, SELECT ON *.* TO '$$DB_EXPORTER_USERNAME'@'%';
          GRANT SLAVE MONITOR, SELECT ON *.* TO '$$DB_EXPORTER_USERNAME'@'%';

          FLUSH PRIVILEGES;
        EOSQL
        echo "Inisialisasi selesai! Service db-init akan berhenti sekarang."
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  phpmyadmin:
    image: phpmyadmin:latest
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops  
    environment:
      # References directly to the service name      
      PMA_HOST: ${DB_HOST}
      PMA_PORT: ${DB_PORT}
      PMA_AUTH_TYPE: cookie
      PMA_ARBITRARY: 1
      PMA_ABSOLUTE_URI: ${PMA_ABSOLUTE_URI}
    expose:
      - "80"
    networks:
      - app_network
    depends_on:
      mariadb:
        condition: service_healthy
    restart: unless-stopped

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops 
    deploy:
      resources:
        limits:
          cpus: '${REDIS_CPU_LIMIT:-0}'
          memory: '${REDIS_MEM_LIMIT:-0b}'     
    ports:
      # FOR DEVELOPMENT PURPOSE ALLOW ALL
      - "${REDIS_PORT}:${REDIS_PORT}"
    volumes:
      - app-redis-data:/data
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "redis-cli","-p","${REDIS_PORT}" , "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --port ${REDIS_PORT} --maxmemory ${REDIS_MAXMEMORY} --maxmemory-policy allkeys-lru
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  # ---- BACKEND SERVICE
  app:
    build:
      context: ./app
      dockerfile: ./Dockerfile.dev
    user: root
    command: >
      sh -c "update-ca-certificates && 
      su -s /bin/sh www-data -c 'php artisan octane:start --server=frankenphp --host=0.0.0.0 --port=8000 --watch'"
    deploy:
      resources:
        limits:
          cpus: '${SERVER_CPU_LIMIT:-0}'
          memory: '${SERVER_MEM_LIMIT:-0b}'
    expose:
      - "${APP_PORT}"
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops
    networks:
      - app_network
    volumes:
      - ./app:/var/www/html:z
      - ./step-ca-public-root.pem:/usr/local/share/ca-certificates/step-ca-public-root.crt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "${REVERB_URL}:host-gateway"
      - "${API_URL}:host-gateway"
    restart: unless-stopped
    working_dir: /var/www/html
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  app-hmr:
    build:
      context: ./app
      dockerfile: ./Dockerfile.dev
    user: root
    command: >
      sh -c "update-ca-certificates && 
      npm install && 
      npm run dev -- --host 0.0.0.0"
    deploy:
      resources:
        limits:
          cpus: '${SERVER_CPU_LIMIT:-0}'
          memory: '${SERVER_MEM_LIMIT:-0b}'
    expose:
      - "5173"
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops
    networks:
      - app_network
    volumes:
      - ./app:/var/www/html:z
      - ./step-ca-public-root.pem:/usr/local/share/ca-certificates/step-ca-public-root.crt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "${REVERB_URL}:host-gateway"
      - "${API_URL}:host-gateway"
    restart: unless-stopped
    working_dir: /var/www/html
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  app-worker:
    build:
      context: ./app
      dockerfile: ./Dockerfile.dev
    command: php artisan queue:work
    deploy:
      resources:
        limits:
          cpus: '${SERVER_CPU_LIMIT:-0}'
          memory: '${SERVER_MEM_LIMIT:-0b}'
    expose:
      - "${APP_PORT}"
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "${REVERB_URL}:host-gateway"
      - "${API_URL}:host-gateway"
    networks:
      - app_network
    volumes:
      - ./app:/var/www/html:z
      - ./step-ca-public-root.pem:/etc/ssl/certs/step-ca-public-root.pem:ro
    restart: unless-stopped
    working_dir: /var/www/html
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  app-socket:
    build:
      context: ./app
      dockerfile: ./Dockerfile.dev
    command: php artisan reverb:start --host=0.0.0.0 --port=${REVERB_SERVER_PORT} --debug
    deploy:
      resources:
        limits:
          cpus: '${SERVER_CPU_LIMIT:-0}'
          memory: '${SERVER_MEM_LIMIT:-0b}'
    expose:
      - "${APP_PORT}"
      - "${REVERB_SERVER_PORT}"
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops
    networks:
      - app_network
    volumes:
      - ./app:/var/www/html:z
      - ./step-ca-public-root.pem:/usr/local/share/ca-certificates/step-ca-public-root.crt:ro
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "${REVERB_URL}:host-gateway"
      - "${API_URL}:host-gateway"
    working_dir: /var/www/html
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

  app-cron:
    build:
      context: ./app
      dockerfile: ./Dockerfile.dev
    command: php artisan schedule:work
    deploy:
      resources:
        limits:
          cpus: '${SERVER_CPU_LIMIT:-0}'
          memory: '${SERVER_MEM_LIMIT:-0b}'
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops 
    networks:
      - app_network
    volumes:
      - ./app:/var/www/html:z
      - ./step-ca-public-root.pem:/usr/local/share/ca-certificates/step-ca-public-root.crt:ro
    # restart: unless-stopped # Cron jangan restart policy strict jika exit code 0 (though schedule:work runs forever)
    restart: unless-stopped
    working_dir: /var/www/html
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "${REVERB_URL}:host-gateway"
      - "${API_URL}:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)
  
  # nginx untuk run server backend
  load_balancer: 
    image: nginx:stable-alpine
    deploy:
      resources:
        limits:
          cpus: '${LOADBALANCER_CPU_LIMIT:-0}'
          memory: '${LOADBALANCER_MEM_LIMIT:-0b}'
    env_file:
      - ./.env
      - ./.env.backend
      - ./.env.devops  
    ports:
      - "${LOAD_BALANCER_PORT}:80"
      - "${LOAD_BALANCER_HMR_PORT}:${LOAD_BALANCER_HMR_PORT}"
    volumes:
      - ./infra/nginx/default.conf.lb.template:/etc/nginx/templates/default.conf.template:ro,Z
      - /etc/letsencrypt:/etc/letsencrypt
    networks:
      - app_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"    # Maksimal 5 Megabyte per file
        max-file: "2"     # Maksimal 2 file (total 10MB)

networks:
  app_network:
    name: ${APP_NETWORK:-app_boilerplate_network}
    external: true

volumes:
  app-mariadb-data:
    driver: local
    name: ${MARIADB_VOLUME_NAME}
  app-redis-data:
    driver: local
    name: ${REDIS_VOLUME_NAME}
  app-storage:
    driver: local
    name: ${APP_SLUG:-app-boilerplate}-storage
  app-minio-data:
    driver: local
    name: ${MINIO_VOLUME_NAME}
