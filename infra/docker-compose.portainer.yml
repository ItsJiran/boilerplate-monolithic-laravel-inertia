version: "3.9"

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: ${APP_SLUG:-app-boilerplate}-portainer
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:z
      - portainer_data:/data

volumes:
  portainer_data:
    driver: local
    name: ${APP_SLUG:-app-boilerplate}-portainer-data
