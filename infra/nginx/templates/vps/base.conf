# =========================================================
# GLOBAL HTTP TO HTTPS REDIRECT
# =========================================================
server {
    listen 80;
    server_name {{APP_DOMAIN}} {{CMS_DOMAIN}} {{PHPMYADMIN_URL}} {{S3_URL}} {{S3_CONSOLE_URL}} {{GRAFANA_URL}} {{HMR_URL}} {{REVERB_URL}};

    return 301 https://$host$request_uri;
}

# =========================================================
# APP / BACKEND SERVER - HTTPS
# =========================================================
server {
    listen 443 ssl http2;
    server_name {{APP_DOMAIN}} *.{{APP_DOMAIN}};

    ssl_certificate     {{SSL_CERT_PATH}};
    ssl_certificate_key {{SSL_KEY_PATH}};

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/app-boilerplate_backend_access.log;
    error_log  /var/log/nginx/app-boilerplate_backend_error.log warn;

    location / {
        proxy_pass http://127.0.0.1:{{LOAD_BALANCER_PORT}};

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
